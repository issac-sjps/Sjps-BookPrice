<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>國小課本採購管理系統</title>

  <!-- Firebase loaded via ES module in script below -->
  <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:       #f5f3ee;
      --surface:  #ffffff;
      --border:   #d9d4c7;
      --accent:   #c0392b;
      --accent2:  #2c6e49;
      --text:     #1a1a1a;
      --muted:    #7a7265;
      --grade1:   #fff8f0;
      --grade2:   #f0f8ff;
      --grade3:   #f0fff4;
      --grade4:   #fff0f8;
      --grade5:   #f8f0ff;
      --grade6:   #fffff0;
      --shadow:   0 2px 12px rgba(0,0,0,.08);
      --radius:   10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: #1a1a1a;
      color: #fff;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: .06em;
      line-height: 1.2;
    }
    header h1 span { color: #e74c3c; }
    .header-meta { font-size: .78rem; color: #aaa; font-family: 'DM Mono', monospace; }

    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar label { font-size: .85rem; color: var(--muted); }
    .toolbar input[type="text"] {
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      font-size: .9rem;
      font-family: inherit;
      width: 220px;
      background: var(--bg);
      transition: border-color .2s;
    }
    .toolbar input[type="text"]:focus { outline: none; border-color: var(--accent); }
    .btn {
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      font-size: .88rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #a93226; }
    .btn-secondary { background: var(--accent2); color: #fff; }
    .btn-secondary:hover { background: #235c3c; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    #status-msg {
      margin-left: auto;
      font-size: .82rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      transition: color .3s;
    }
    #status-msg.ok   { color: var(--accent2); }
    #status-msg.err  { color: var(--accent); }
    #status-msg.busy { color: #e67e22; }

    /* ── MAIN WRAPPER ── */
    main {
      padding: 32px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── TABLE CARD ── */
    .table-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 32px;
    }

    .table-scroll { overflow-x: auto; }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 920px;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 0;
      vertical-align: middle;
    }

    /* HEADER ROW */
    thead th {
      background: #1a1a1a;
      color: #fff;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .05em;
      padding: 12px 10px;
      text-align: center;
    }
    thead th:first-child {
      background: #111;
      text-align: left;
      padding-left: 16px;
      width: 130px;
    }

    /* GRADE COLORS */
    .col-g1 { background: var(--grade1); }
    .col-g2 { background: var(--grade2); }
    .col-g3 { background: var(--grade3); }
    .col-g4 { background: var(--grade4); }
    .col-g5 { background: var(--grade5); }
    .col-g6 { background: var(--grade6); }

    /* SUBJECT CELL */
    .subject-cell {
      font-size: .82rem;
      font-weight: 700;
      color: var(--muted);
      padding: 10px 14px;
      background: #fafaf8;
      min-width: 110px;
      border-right: 2px solid var(--border);
    }

    /* BOOK CELL */
    .book-cell {
      padding: 10px 10px;
      min-width: 130px;
      position: relative;
    }
    .book-cell.na {
      background: repeating-linear-gradient(
        45deg, #f0ede8, #f0ede8 4px, #e8e4de 4px, #e8e4de 8px
      );
    }

    .book-info {
      font-size: .74rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 6px;
    }
    /* publisher + vol row */
    .pub-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 5px;
    }
    .pub-select {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .8rem;
      font-weight: 700;
      color: var(--text);
      background: #f5f3ee;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      padding: 3px 2px 3px 5px;
      cursor: pointer;
      flex: 1;
      min-width: 0;
    }
    .pub-select:focus { outline: none; border-color: var(--accent); }
    .vol-select {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .78rem;
      font-weight: 600;
      color: #555;
      background: #ececec;
      border: 1.5px solid #d0ccc4;
      border-radius: 5px;
      padding: 3px 2px 3px 4px;
      cursor: pointer;
      width: 62px;
      flex-shrink: 0;
    }
    .vol-select:focus { outline: none; border-color: var(--accent); }
    /* notes input */
    .notes-input {
      width: 100%;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .75rem;
      color: #555;
      background: #fafaf5;
      border: 1.5px dashed #c8c4ba;
      border-radius: 5px;
      padding: 4px 6px;
      margin-top: 4px;
      resize: none;
      height: 46px;
      line-height: 1.5;
    }
    .notes-input:focus { outline: none; border-color: #aaa; background: #fff; }

    /* CHECKBOX ROWS */
    .check-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: .78rem;
    }
    .check-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }
    .check-row label {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text);
    }
    .price-tag {
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
      font-weight: 600;
      color: var(--accent);
      margin-left: auto;
    }
    /* editable price input */
    .price-input {
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
      font-weight: 700;
      color: var(--accent);
      background: transparent;
      border: none;
      border-bottom: 1.5px dashed #e0a0a0;
      width: 52px;
      text-align: right;
      margin-left: auto;
      padding: 1px 2px;
      cursor: text;
      outline: none;
    }
    .price-input:focus {
      background: #fff5f5;
      border-bottom-color: var(--accent);
      border-radius: 3px 3px 0 0;
    }

    /* TOTAL ROW */
    .total-row td {
      background: #1a1a1a !important;
      color: #fff;
      font-weight: 700;
      text-align: center;
      padding: 14px 10px;
    }
    .total-row td:first-child {
      text-align: left;
      padding-left: 16px;
      font-size: .9rem;
      letter-spacing: .04em;
    }
    .total-amount {
      font-family: 'DM Mono', monospace;
      font-size: 1.05rem;
      color: #f1c40f;
    }
    .total-amount span {
      font-size: .72rem;
      color: #aaa;
      display: block;
      margin-bottom: 2px;
    }

    /* SUMMARY CARDS */
    .summary-section h2 {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: .06em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-left: 2px;
      border-left: 3px solid var(--accent);
      padding-left: 10px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
    }
    .card.g1::before { background: #f39c12; }
    .card.g2::before { background: #3498db; }
    .card.g3::before { background: #2ecc71; }
    .card.g4::before { background: #e91e8c; }
    .card.g5::before { background: #9b59b6; }
    .card.g6::before { background: #e6b800; }
    .card-label {
      font-size: .72rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card-total {
      font-size: 1.6rem;
      font-weight: 900;
      font-family: 'DM Mono', monospace;
      color: var(--text);
    }
    .card-total::after {
      content: ' 元';
      font-size: .8rem;
      color: var(--muted);
      font-weight: 400;
    }
    .card-detail {
      font-size: .72rem;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.6;
    }
    .grand-card {
      background: #1a1a1a;
      color: #fff;
    }
    .grand-card .card-label { color: #aaa; }
    .grand-card .card-total { color: #f1c40f; }
    .grand-card .card-detail { color: #888; }

    /* FIREBASE CONFIG MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 36px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .modal h2 { font-size: 1.2rem; font-weight: 900; margin-bottom: 8px; }
    .modal p  { font-size: .85rem; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
    .modal .field { margin-bottom: 14px; }
    .modal .field label { display: block; font-size: .8rem; font-weight: 700; margin-bottom: 5px; color: #555; }
    .modal .field input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: .85rem;
      font-family: 'DM Mono', monospace;
      background: var(--bg);
    }
    .modal .field input:focus { outline: none; border-color: var(--accent); }
    .modal .actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .modal-note {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 6px;
      padding: 12px;
      font-size: .78rem;
      color: #795548;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 30px; right: 30px;
      background: #1a1a1a;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: .85rem;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s ease;
      z-index: 9998;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    /* ── TABS ── */
    .tab-bar {
      display: flex;
      gap: 0;
      padding: 0 40px;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
    }
    .tab-btn {
      padding: 13px 26px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .88rem;
      font-weight: 700;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all .18s;
      letter-spacing: .03em;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── PUBLISHER STATS TAB ── */
    .stats-section { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }
    .stats-section h2 {
      font-size: 1rem; font-weight: 800; color: var(--muted);
      border-left: 3px solid var(--accent); padding-left: 10px;
      letter-spacing: .06em; text-transform: uppercase; margin-bottom: 20px;
    }
    .qty-table-wrap {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow-x: auto;
      margin-bottom: 32px;
    }
    .qty-table {
      border-collapse: collapse;
      width: 100%;
    }
    .qty-table th, .qty-table td {
      border: 1px solid var(--border);
      padding: 0;
      vertical-align: middle;
    }
    .qty-table thead th {
      background: #1a1a1a;
      color: #fff;
      font-size: .8rem;
      font-weight: 700;
      padding: 11px 10px;
      text-align: center;
      letter-spacing: .04em;
    }
    .qty-table thead th:first-child { text-align: left; padding-left: 16px; min-width: 160px; }
    .qty-table tbody tr:nth-child(even) td { background: #fafaf8; }
    .qty-table td.row-label {
      padding: 8px 14px;
      font-size: .8rem;
      font-weight: 600;
      color: var(--text);
      background: #fafaf8;
      border-right: 2px solid var(--border);
      white-space: nowrap;
    }
    .qty-table td.row-label .pub-badge {
      display: inline-block;
      font-size: .68rem;
      padding: 1px 6px;
      border-radius: 3px;
      margin-left: 5px;
      font-weight: 700;
    }
    .pub-kx { background: #fde8e8; color: #c0392b; }
    .pub-ny { background: #e8f4fd; color: #2980b9; }
    .pub-hl { background: #eafbe8; color: #27ae60; }
    .pub-other { background: #f5f0ff; color: #8e44ad; }
    .qty-table td.price-cell {
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
      color: var(--accent);
      text-align: right;
      padding: 8px 10px;
      font-weight: 600;
      min-width: 60px;
    }
    .qty-table td.qty-cell { padding: 5px 6px; text-align: center; min-width: 70px; }
    .qty-input {
      width: 58px;
      font-family: 'DM Mono', monospace;
      font-size: .82rem;
      font-weight: 600;
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 5px;
      padding: 5px 6px;
      text-align: center;
      background: #fafaf8;
    }
    .qty-input:focus { outline: none; border-color: var(--accent2); background: #fff; }
    .qty-table td.subtotal-cell {
      font-family: 'DM Mono', monospace;
      font-size: .82rem;
      font-weight: 700;
      color: var(--accent2);
      text-align: right;
      padding: 8px 12px;
      min-width: 80px;
    }
    .qty-table tfoot td {
      background: #1a1a1a !important;
      color: #fff;
      font-weight: 700;
      text-align: center;
      padding: 12px 10px;
      font-size: .88rem;
    }
    .qty-table tfoot td:first-child { text-align: left; padding-left: 16px; }
    .qty-table tfoot .foot-total {
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      color: #f1c40f;
    }

    /* publisher summary cards */
    .pub-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 14px; margin-top: 24px; }
    .pub-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .pub-card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; }
    .pub-card.kx::before  { background: #c0392b; }
    .pub-card.ny::before  { background: #2980b9; }
    .pub-card.hl::before  { background: #27ae60; }
    .pub-card.oth::before { background: #8e44ad; }
    .pub-card-label { font-size:.72rem; color:var(--muted); font-weight:700; letter-spacing:.07em; text-transform:uppercase; margin-bottom:8px; }
    .pub-card-total { font-size:1.6rem; font-weight:900; font-family:'DM Mono',monospace; }
    .pub-card-total::after { content:' 元'; font-size:.8rem; color:var(--muted); font-weight:400; }
    .pub-card-detail { font-size:.72rem; color:var(--muted); margin-top:6px; line-height:1.7; }
    .grand-pub-card { background:#1a1a1a; color:#fff; }
    .grand-pub-card .pub-card-label { color:#aaa; }
    .grand-pub-card .pub-card-total { color:#f1c40f; }
    .grand-pub-card .pub-card-total::after { color:#888; }

    @media (max-width: 768px) {
      .tab-bar { padding: 0 16px; }
      .stats-section { padding: 16px; }
    }

    /* ── EDITABLE HEADER BANNER ── */
    .doc-header-bar {
      background: #fff;
      border-bottom: 2px solid var(--border);
      padding: 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .doc-header-bar label {
      font-size: .72rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: .05em;
    }
    .doc-title-input {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a1a1a;
      border: 1.5px dashed #c5c0b8;
      border-radius: 6px;
      padding: 8px 12px;
      background: #fafaf8;
      width: 100%;
      max-width: 720px;
    }
    .doc-title-input:focus { outline: none; border-color: var(--accent); background: #fff; }
    .doc-subtitle-input {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .88rem;
      color: #555;
      border: 1.5px dashed #c5c0b8;
      border-radius: 6px;
      padding: 6px 12px;
      background: #fafaf8;
      width: 100%;
      max-width: 480px;
    }
    .doc-subtitle-input:focus { outline: none; border-color: var(--accent); background: #fff; }

    /* ── PRINT ── */
    @media print {
      header, .toolbar, .doc-header-bar, .summary-section, #toast,
      .btn, #status-msg { display: none !important; }

      body { background: #fff; }
      main { padding: 0; max-width: 100%; }
      .table-card { box-shadow: none; border-radius: 0; }

      /* Print header injected via JS */
      .print-doc-header {
        display: block !important;
        text-align: center;
        margin-bottom: 10px;
      }
      .print-doc-header h2 {
        font-size: 14pt;
        font-weight: 900;
        margin: 0 0 4px;
      }
      .print-doc-header p {
        font-size: 10pt;
        color: #555;
        margin: 0;
      }

      table { min-width: unset; font-size: 9pt; }
      .book-cell { min-width: unset; padding: 5px 6px; }
      .pub-select, .vol-select { border: none; background: transparent;
        font-size: 9pt; font-weight: 700; -webkit-appearance: none; appearance: none; pointer-events: none; }
      .price-input { border: none; background: transparent; font-size: 9pt; font-weight: 700; }
      .notes-input { border: none; background: transparent; font-size: 8pt; resize: none; height: auto; overflow: visible; }
      .check-row input[type="checkbox"] { display: none; }
      .check-row label { font-size: 8pt; }
      thead th { background: #333 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .col-g1, .col-g2, .col-g3, .col-g4, .col-g5, .col-g6 {
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
      }
      .total-row td { background: #333 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
    .print-doc-header { display: none; }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div>
    <h1>國小課本 <span>採購管理</span> 系統</h1>
    <div class="header-meta">Elementary School Textbook Purchase Tracker</div>
  </div>
</header>

<!-- ── EDITABLE DOCUMENT HEADER ── -->
<div class="doc-header-bar">
  <div>
    <label>📄 文件標題（列印/匯出 Word 時顯示）</label>
    <input class="doc-title-input" id="doc-title"
      value="高雄市左營區新莊國民小學114下教科書版本一覽表(家長價)" />
  </div>
  <div>
    <label>📝 副標題 / 備注</label>

// Better approach: one row per subject+grade+type with qty input in the correct grade column
// Let me rebuild buildQtyTable with proper per-grade columns
function buildQtyTable() {
  const tbody = document.getElementById('qty-body');
  const tfoot = document.getElementById('qty-foot');
  tbody.innerHTML = '';
  tfoot.innerHTML = '';

  // Each row = one book entry (subject, grade, type)
  // Columns: Label | 書商 | 類型 | 定價 | 數量 | 小計
  // We'll show all 6 grade columns, only the relevant grade gets an input

  SUBJECTS.forEach((subj, si) => {
    subj.grades.forEach((g, gi) => {
      if (!g) return;

      const pubEl  = document.getElementById(`pub-${si}-${gi}`);
      const tbPrEl = document.getElementById(`tp-${si}-${gi}`);
      const wbPrEl = document.getElementById(`wp-${si}-${gi}`);

      const pub  = pubEl  ? pubEl.value  : g.publisher;
      const tbPr = tbPrEl ? parseInt(tbPrEl.value) : g.tb;
      const wbPr = wbPrEl ? parseInt(wbPrEl.value) : (g.wb || 0);

      const gradeNames = ['一','二','三','四','五','六'];
      const rowLabel = `${subj.name.replace('\n',' ')}`;
      const badgeClass = pubBadgeClass(pub);

      const types = ['tb', ...(g.wb ? ['wb'] : [])];
      types.forEach(type => {
        const price = type === 'tb' ? tbPr : wbPr;
        const qkey  = `${si}_${gi}_${type}`;
        if (!(qkey in qtyStore)) qtyStore[qkey] = 0;
        const qty = qtyStore[qkey];

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="row-label">
            ${rowLabel}
            <span class="pub-badge ${badgeClass}">${pub}</span>
          </td>
          <td style="text-align:center;font-size:.75rem;font-weight:600;color:#888;padding:6px 4px">
            ${gradeNames[gi]}年 ${type==='tb'?'課本':'習作'}
          </td>
          <td class="price-cell">$${price}</td>
          <td class="qty-cell">
            <input type="number" class="qty-input" min="0" value="${qty}"
              data-qkey="${qkey}" data-price="${price}"
              oninput="updateQty(this)" />
          </td>
          <td class="subtotal-cell" id="qsub-${qkey}">$${(price*qty).toLocaleString()}</td>`;
        tbody.appendChild(tr);
      });
    });
  });

  // footer: per-publisher totals
  recalcPub();
}

window.updateQty = function(inp) {
  const qkey = inp.dataset.qkey;
  qtyStore[qkey] = parseInt(inp.value) || 0;
  const price = parseInt(inp.dataset.price) || 0;
  const subEl = document.getElementById(`qsub-${qkey}`);
  if (subEl) subEl.textContent = `$${(price * qtyStore[qkey]).toLocaleString()}`;
  recalcPub();
};

function recalcPub() {
  // gather per-publisher totals
  const pubTotals = {};   // publisher => { total, bookCount }
  const pubBooks  = {};   // publisher => { bookTitle: subtotal }

  SUBJECTS.forEach((subj, si) => {
    subj.grades.forEach((g, gi) => {
      if (!g) return;
      const pubEl  = document.getElementById(`pub-${si}-${gi}`);
      const tbPrEl = document.getElementById(`tp-${si}-${gi}`);
      const wbPrEl = document.getElementById(`wp-${si}-${gi}`);
      const pub  = pubEl  ? pubEl.value  : g.publisher;
      const tbPr = tbPrEl ? parseInt(tbPrEl.value) : g.tb;
      const wbPr = wbPrEl ? parseInt(wbPrEl.value) : (g.wb || 0);

      if (!pubTotals[pub]) { pubTotals[pub] = 0; pubBooks[pub] = 0; }

      ['tb', ...(g.wb ? ['wb'] : [])].forEach(type => {
        const price = type === 'tb' ? tbPr : wbPr;
        const qty   = qtyStore[`${si}_${gi}_${type}`] || 0;
        pubTotals[pub] += price * qty;
        if (qty > 0) pubBooks[pub]++;
      });
    });
  });

  // footer row
  const tfoot = document.getElementById('qty-foot');
  const grand = Object.values(pubTotals).reduce((a,b)=>a+b,0);
  tfoot.innerHTML = `
    <tr>
      <td colspan="4" style="text-align:left;padding-left:16px">📊 全校總計</td>
      <td></td>
      <td class="foot-total">$${grand.toLocaleString()}</td>
    </tr>`;

  // publisher cards
  const container = document.getElementById('pub-cards');
  container.innerHTML = '';
  const sortedPubs = Object.keys(pubTotals).sort((a,b) => pubTotals[b]-pubTotals[a]);
  sortedPubs.forEach(pub => {
    const card = document.createElement('div');
    card.className = `pub-card ${pubCardClass(pub)}`;
    card.innerHTML = `
      <div class="pub-card-label">${pub} 出版社</div>
      <div class="pub-card-total">${pubTotals[pub].toLocaleString()}</div>
      <div class="pub-card-detail">共 ${pubBooks[pub]} 筆有數量書目</div>`;
    container.appendChild(card);
  });

  // grand total card
  const gcard = document.createElement('div');
  gcard.className = 'pub-card grand-pub-card';
  gcard.innerHTML = `
    <div class="pub-card-label">全校總計</div>
    <div class="pub-card-total">${grand.toLocaleString()}</div>
    <div class="pub-card-detail">所有書商合計</div>`;
  container.appendChild(gcard);
}


function updatePrice(inputEl, cbId) {
  const cb = document.getElementById(cbId);
  const val = parseInt(inputEl.value) || 0;
  if (cb) cb.dataset.price = val;
  recalculate();
}
window.updatePrice = updatePrice;


function recalculate() {
  const totals = [0,0,0,0,0,0];
  const details = Array.from({length:6}, () => ({tb:0, wb:0, items:[]}));

  document.querySelectorAll('#table-body input[type="checkbox"]:checked').forEach(cb => {
    const gi    = parseInt(cb.dataset.gi);
    const si    = parseInt(cb.dataset.si);
    const price = parseInt(cb.dataset.price);
    const type  = cb.dataset.type;
    totals[gi] += price;
    details[gi][type] += price;
    details[gi].items.push({ name: SUBJECTS[si].name.replace('\n',' '), type, price });
  });

  // update table footer
  for (let i = 0; i < 6; i++) {
    document.getElementById(`tot-g${i+1}`).innerHTML =
      `<div class="total-amount"><span>合計</span>${totals[i].toLocaleString()} 元</div>`;
  }

  // update summary cards
  buildSummaryCards(totals, details);
}

function buildSummaryCards(totals, details) {
  const grand = totals.reduce((a,b)=>a+b,0);
  const container = document.getElementById('summary-cards');
  container.innerHTML = '';

  const gradeNames = ['一','二','三','四','五','六'];
  totals.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = `card g${i+1}`;
    card.innerHTML = `
      <div class="card-label">第 ${gradeNames[i]} 年級</div>
      <div class="card-total">${t.toLocaleString()}</div>
      <div class="card-detail">
        課本：$${details[i].tb.toLocaleString()}<br>
        習作：$${details[i].wb.toLocaleString()}
      </div>`;
    container.appendChild(card);
  });

  // grand total
  const grand_card = document.createElement('div');
  grand_card.className = 'card grand-card';
  grand_card.innerHTML = `
    <div class="card-label">全校合計</div>
    <div class="card-total" style="color:#f1c40f">${grand.toLocaleString()}</div>
    <div class="card-detail">所有年級 / 全科目</div>`;
  container.appendChild(grand_card);
}

// ── PRINT ─────────────────────────────────────────────────────────
function printTable() {
  document.getElementById('print-title-text').textContent    = document.getElementById('doc-title').value;
  document.getElementById('print-subtitle-text').textContent = document.getElementById('doc-subtitle').value;
  window.print();
}
window.printTable = printTable;

// ── DOWNLOAD WORD ──────────────────────────────────────────────────
async function downloadWord() {
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
          AlignmentType, WidthType, BorderStyle, ShadingType, VerticalAlign,
          PageOrientation } = docx;

  const title    = document.getElementById('doc-title').value;
  const subtitle = document.getElementById('doc-subtitle').value;

  const border = { style: BorderStyle.SINGLE, size: 4, color: '888888' };
  const borders = { top: border, bottom: border, left: border, right: border };
  const thickBorder = { style: BorderStyle.SINGLE, size: 8, color: '333333' };
  const thickBorders = { top: thickBorder, bottom: thickBorder, left: thickBorder, right: thickBorder };

  // column widths: subject(1400) + 6 grades(1200 each) = 8600 DXA
  const COL_SUBJ  = 1400;
  const COL_GRADE = 1200;
  const TABLE_W   = COL_SUBJ + COL_GRADE * 6; // 8600

  const gradeNames = ['一年級','二年級','三年級','四年級','五年級','六年級'];

  function hCell(text) {
    return new TableCell({
      borders: thickBorders,
      width: { size: text === '領域/科目' ? COL_SUBJ : COL_GRADE, type: WidthType.DXA },
      shading: { fill: '333333', type: ShadingType.CLEAR },
      margins: { top: 60, bottom: 60, left: 80, right: 80 },
      verticalAlign: VerticalAlign.CENTER,
      children: [new Paragraph({
        alignment: AlignmentType.CENTER,
        children: [new TextRun({ text, bold: true, color: 'FFFFFF', size: 18, font: 'Arial Unicode MS' })]
      })]
    });
  }

  // header row
  const headerRow = new TableRow({
    tableHeader: true,
    children: [
      hCell('領域/科目'),
      ...gradeNames.map(g => hCell(g))
    ]
  });

  // data rows
  const dataRows = SUBJECTS.map((subj, si) => {
    const cells = [
      new TableCell({
        borders,
        width: { size: COL_SUBJ, type: WidthType.DXA },
        shading: { fill: 'F5F3EE', type: ShadingType.CLEAR },
        margins: { top: 60, bottom: 60, left: 80, right: 80 },
        verticalAlign: VerticalAlign.CENTER,
        children: [new Paragraph({
          alignment: AlignmentType.CENTER,
          children: [new TextRun({ text: subj.name.replace('\n',' '), bold: true, size: 17, font: 'Arial Unicode MS' })]
        })]
      }),
      ...subj.grades.map((g, gi) => {
        if (!g) {
          return new TableCell({
            borders,
            width: { size: COL_GRADE, type: WidthType.DXA },
            shading: { fill: 'EEECE6', type: ShadingType.CLEAR },
            margins: { top: 40, bottom: 40, left: 60, right: 60 },
            children: [new Paragraph({ children: [new TextRun({ text: '──', color: 'AAAAAA', size: 16 })] })]
          });
        }

        const pubEl   = document.getElementById(`pub-${si}-${gi}`);
        const volEl   = document.getElementById(`vol-${si}-${gi}`);
        const noteEl  = document.getElementById(`note-${si}-${gi}`);
        const tbPrEl  = document.getElementById(`tp-${si}-${gi}`);
        const wbPrEl  = document.getElementById(`wp-${si}-${gi}`);

        const pub   = pubEl  ? pubEl.value  : g.publisher;
        const vol   = volEl  ? volEl.value  : g.vol;
        const note  = noteEl ? noteEl.value : (g.notes || '');
        const tbPr  = tbPrEl ? tbPrEl.value : g.tb;
        const wbPr  = wbPrEl ? wbPrEl.value : (g.wb || '');

        const parasArr = [];

        // publisher + vol
        parasArr.push(new Paragraph({
          alignment: AlignmentType.CENTER,
          children: [
            new TextRun({ text: pub, bold: true, size: 18, font: 'Arial Unicode MS' }),
            new TextRun({ text: `  第${vol}冊`, size: 16, color: '555555', font: 'Arial Unicode MS' }),
          ]
        }));

        // notes (English)
        if (note) {
          parasArr.push(new Paragraph({
            alignment: AlignmentType.CENTER,
            children: [new TextRun({ text: note, size: 15, color: '886622', italics: true, font: 'Arial Unicode MS' })]
          }));
        }

        // textbook price
        parasArr.push(new Paragraph({
          alignment: AlignmentType.CENTER,
          children: [
            new TextRun({ text: '課本 ', size: 16, font: 'Arial Unicode MS' }),
            new TextRun({ text: `$${tbPr}`, bold: true, color: 'C0392B', size: 17, font: 'DM Mono' }),
          ]
        }));

        // workbook price
        if (wbPr) {
          parasArr.push(new Paragraph({
            alignment: AlignmentType.CENTER,
            children: [
              new TextRun({ text: '習作 ', size: 16, font: 'Arial Unicode MS' }),
              new TextRun({ text: `$${wbPr}`, bold: true, color: 'C0392B', size: 17, font: 'DM Mono' }),
            ]
          }));
        }

        return new TableCell({
          borders,
          width: { size: COL_GRADE, type: WidthType.DXA },
          margins: { top: 60, bottom: 60, left: 60, right: 60 },
          verticalAlign: VerticalAlign.CENTER,
          children: parasArr,
        });
      })
    ];

    return new TableRow({ children: cells });
  });

  // totals row
  const totals = [0,0,0,0,0,0];
  document.querySelectorAll('#table-body input[type="checkbox"]:checked').forEach(cb => {
    const gi = parseInt(cb.dataset.gi);
    totals[gi] += parseInt(cb.dataset.price) || 0;
  });

  const totalRow = new TableRow({
    children: [
      new TableCell({
        borders: thickBorders,
        width: { size: COL_SUBJ, type: WidthType.DXA },
        shading: { fill: '1A1A1A', type: ShadingType.CLEAR },
        margins: { top: 60, bottom: 60, left: 80, right: 80 },
        children: [new Paragraph({
          alignment: AlignmentType.CENTER,
          children: [new TextRun({ text: '年級合計', bold: true, color: 'FFFFFF', size: 18, font: 'Arial Unicode MS' })]
        })]
      }),
      ...totals.map(t => new TableCell({
        borders: thickBorders,
        width: { size: COL_GRADE, type: WidthType.DXA },
        shading: { fill: '1A1A1A', type: ShadingType.CLEAR },
        margins: { top: 60, bottom: 60, left: 60, right: 60 },
        verticalAlign: VerticalAlign.CENTER,
        children: [new Paragraph({
          alignment: AlignmentType.CENTER,
          children: [new TextRun({ text: `$${t.toLocaleString()}`, bold: true, color: 'F1C40F', size: 20, font: 'DM Mono' })]
        })]
      }))
    ]
  });

  const table = new Table({
    width: { size: TABLE_W, type: WidthType.DXA },
    columnWidths: [COL_SUBJ, ...Array(6).fill(COL_GRADE)],
    rows: [headerRow, ...dataRows, totalRow],
  });

  const doc = new Document({
    sections: [{
      properties: {
        page: {
          size: { width: 15840, height: 12240, orientation: PageOrientation.LANDSCAPE },
          margin: { top: 720, right: 720, bottom: 720, left: 720 }
        }
      },
      children: [
        new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { after: 80 },
          children: [new TextRun({ text: title, bold: true, size: 28, font: 'Arial Unicode MS' })]
        }),
        new Paragraph({
          alignment: AlignmentType.RIGHT,
          spacing: { after: 160 },
          children: [new TextRun({ text: subtitle, size: 18, color: '666666', font: 'Arial Unicode MS' })]
        }),
        table,
      ]
    }]
  });

  const buffer = await Packer.toBlob(doc);
  const url = URL.createObjectURL(buffer);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${title}.docx`;
  a.click();
  URL.revokeObjectURL(url);
  toast('✅ Word 檔案下載中！');
}
window.downloadWord = downloadWord;


function resetAll() {
  document.querySelectorAll('#table-body input[type="checkbox"]').forEach(cb => cb.checked = false);
  recalculate();
  toast('已清除所有勾選');
}

// ── FIREBASE SAVE / LOAD ──────────────────────────────────────────
async function saveData() {
  const name = document.getElementById('school-name').value.trim();
  if (!name) { toast('請先輸入學校/班級名稱'); return; }

  const payload = { name, savedAt: new Date().toISOString(), selections: {}, prices: {}, meta: {}, qty: {} };
  document.querySelectorAll('#table-body input[type="checkbox"]').forEach(cb => {
    const key = `${cb.dataset.si}_${cb.dataset.gi}_${cb.dataset.type}`;
    payload.selections[key] = cb.checked;
    payload.prices[key] = parseInt(cb.dataset.price) || 0;
  });
  // save qty
  Object.entries(qtyStore).forEach(([k,v]) => { payload.qty[k] = v; });
  // save publisher, vol, notes per cell
  SUBJECTS.forEach((subj, si) => {
    subj.grades.forEach((g, gi) => {
      if (!g) return;
      const mkey = `${si}_${gi}`;
      const pubEl  = document.getElementById(`pub-${si}-${gi}`);
      const volEl  = document.getElementById(`vol-${si}-${gi}`);
      const noteEl = document.getElementById(`note-${si}-${gi}`);
      payload.meta[mkey] = {
        pub:  pubEl  ? pubEl.value  : g.publisher,
        vol:  volEl  ? volEl.value  : g.vol,
        note: noteEl ? noteEl.value : (g.notes||''),
      };
    });
  });

  setStatus('儲存中…','busy');
  try {
    await setDoc(doc(db, 'purchases', name), payload);
    setStatus('✅ 已儲存','ok');
    toast('✅ 儲存成功！');
  } catch(e) {
    setStatus('❌ 儲存失敗','err');
    toast('儲存失敗：' + e.message);
  }
}

async function loadData() {
  const name = document.getElementById('school-name').value.trim();
  if (!name) { toast('請先輸入學校/班級名稱'); return; }

  setStatus('載入中…','busy');
  try {
    const snap = await getDoc(doc(db, 'purchases', name));
    if (!snap.exists()) { toast('找不到此名稱的資料'); setStatus('找不到資料','err'); return; }

    const sel    = snap.data().selections || {};
    const prices = snap.data().prices     || {};
    const meta   = snap.data().meta       || {};

    document.querySelectorAll('#table-body input[type="checkbox"]').forEach(cb => {
      const key = `${cb.dataset.si}_${cb.dataset.gi}_${cb.dataset.type}`;
      cb.checked = !!sel[key];
      if (prices[key] !== undefined) {
        cb.dataset.price = prices[key];
        const prefix = cb.dataset.type === 'tb' ? 'tp' : 'wp';
        const inp = document.getElementById(`${prefix}-${cb.dataset.si}-${cb.dataset.gi}`);
        if (inp) inp.value = prices[key];
      }
    });

    // restore publisher / vol / notes
    Object.entries(meta).forEach(([mkey, m]) => {
      const [si, gi] = mkey.split('_');
      const pubEl  = document.getElementById(`pub-${si}-${gi}`);
      const volEl  = document.getElementById(`vol-${si}-${gi}`);
      const noteEl = document.getElementById(`note-${si}-${gi}`);
      if (pubEl  && m.pub)  pubEl.value  = m.pub;
      if (volEl  && m.vol)  volEl.value  = m.vol;
      if (noteEl && m.note !== undefined) noteEl.value = m.note;
    });
    // restore qty
    const savedQty = snap.data().qty || {};
    Object.entries(savedQty).forEach(([k,v]) => { qtyStore[k] = v; });

    recalculate();
    setStatus('✅ 已載入','ok');
    toast('✅ 資料載入成功！');
  } catch(e) {
    setStatus('❌ 載入失敗','err');
    toast('載入失敗：' + e.message);
  }
}

// expose to inline onclick handlers
window.saveData = saveData;
window.loadData = loadData;

// ── STATUS / TOAST ─────────────────────────────────────────────────
function setStatus(msg, cls) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = cls;
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── INIT ──────────────────────────────────────────────────────────
window.resetAll = resetAll;

window.addEventListener('DOMContentLoaded', () => {
  buildTable();
  document.querySelectorAll('#table-body input[type="checkbox"]').forEach(cb => cb.checked = true);
  recalculate();
  setStatus('✅ Firebase 已連線', 'ok');
});
</script>
