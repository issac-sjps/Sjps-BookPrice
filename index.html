<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>國小課本採購管理系統</title>

  <!-- Firebase loaded via ES module in script below -->

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:       #f5f3ee;
      --surface:  #ffffff;
      --border:   #d9d4c7;
      --accent:   #c0392b;
      --accent2:  #2c6e49;
      --text:     #1a1a1a;
      --muted:    #7a7265;
      --grade1:   #fff8f0;
      --grade2:   #f0f8ff;
      --grade3:   #f0fff4;
      --grade4:   #fff0f8;
      --grade5:   #f8f0ff;
      --grade6:   #fffff0;
      --shadow:   0 2px 12px rgba(0,0,0,.08);
      --radius:   10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: #1a1a1a;
      color: #fff;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: .06em;
      line-height: 1.2;
    }
    header h1 span { color: #e74c3c; }
    .header-meta { font-size: .78rem; color: #aaa; font-family: 'DM Mono', monospace; }

    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar label { font-size: .85rem; color: var(--muted); }
    .toolbar input[type="text"] {
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      font-size: .9rem;
      font-family: inherit;
      width: 220px;
      background: var(--bg);
      transition: border-color .2s;
    }
    .toolbar input[type="text"]:focus { outline: none; border-color: var(--accent); }
    .btn {
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      font-size: .88rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #a93226; }
    .btn-secondary { background: var(--accent2); color: #fff; }
    .btn-secondary:hover { background: #235c3c; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    #status-msg {
      margin-left: auto;
      font-size: .82rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      transition: color .3s;
    }
    #status-msg.ok   { color: var(--accent2); }
    #status-msg.err  { color: var(--accent); }
    #status-msg.busy { color: #e67e22; }

    /* ── MAIN WRAPPER ── */
    main {
      padding: 32px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── TABLE CARD ── */
    .table-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 32px;
    }

    .table-scroll { overflow-x: auto; }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 920px;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 0;
      vertical-align: middle;
    }

    /* HEADER ROW */
    thead th {
      background: #1a1a1a;
      color: #fff;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .05em;
      padding: 12px 10px;
      text-align: center;
    }
    thead th:first-child {
      background: #111;
      text-align: left;
      padding-left: 16px;
      width: 130px;
    }

    /* GRADE COLORS */
    .col-g1 { background: var(--grade1); }
    .col-g2 { background: var(--grade2); }
    .col-g3 { background: var(--grade3); }
    .col-g4 { background: var(--grade4); }
    .col-g5 { background: var(--grade5); }
    .col-g6 { background: var(--grade6); }

    /* SUBJECT CELL */
    .subject-cell {
      font-size: .82rem;
      font-weight: 700;
      color: var(--muted);
      padding: 10px 14px;
      background: #fafaf8;
      min-width: 110px;
      border-right: 2px solid var(--border);
    }

    /* BOOK CELL */
    .book-cell {
      padding: 10px 10px;
      min-width: 130px;
      position: relative;
    }
    .book-cell.na {
      background: repeating-linear-gradient(
        45deg, #f0ede8, #f0ede8 4px, #e8e4de 4px, #e8e4de 8px
      );
    }

    .book-info {
      font-size: .74rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 6px;
    }
    /* publisher + vol row */
    .pub-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 5px;
    }
    .pub-select {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      color: var(--text);
      background: #f5f3ee;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      padding: 3px 5px;
      cursor: pointer;
      flex: 1;
      min-width: 0;
    }
    .pub-select:focus { outline: none; border-color: var(--accent); }
    .vol-select {
      font-family: 'DM Mono', monospace;
      font-size: .82rem;
      font-weight: 600;
      color: #555;
      background: #ececec;
      border: 1.5px solid #d0ccc4;
      border-radius: 5px;
      padding: 3px 4px;
      cursor: pointer;
      width: 52px;
      flex-shrink: 0;
    }
    .vol-select:focus { outline: none; border-color: var(--accent); }
    /* notes input */
    .notes-input {
      width: 100%;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: .75rem;
      color: #555;
      background: #fafaf5;
      border: 1.5px dashed #c8c4ba;
      border-radius: 5px;
      padding: 4px 6px;
      margin-top: 4px;
      resize: none;
      height: 46px;
      line-height: 1.5;
    }
    .notes-input:focus { outline: none; border-color: #aaa; background: #fff; }

    /* CHECKBOX ROWS */
    .check-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: .78rem;
    }
    .check-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }
    .check-row label {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text);
    }
    .price-tag {
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
      font-weight: 600;
      color: var(--accent);
      margin-left: auto;
    }
    /* editable price input */
    .price-input {
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
      font-weight: 700;
      color: var(--accent);
      background: transparent;
      border: none;
      border-bottom: 1.5px dashed #e0a0a0;
      width: 52px;
      text-align: right;
      margin-left: auto;
      padding: 1px 2px;
      cursor: text;
      outline: none;
    }
    .price-input:focus {
      background: #fff5f5;
      border-bottom-color: var(--accent);
      border-radius: 3px 3px 0 0;
    }

    /* TOTAL ROW */
    .total-row td {
      background: #1a1a1a !important;
      color: #fff;
      font-weight: 700;
      text-align: center;
      padding: 14px 10px;
    }
    .total-row td:first-child {
      text-align: left;
      padding-left: 16px;
      font-size: .9rem;
      letter-spacing: .04em;
    }
    .total-amount {
      font-family: 'DM Mono', monospace;
      font-size: 1.05rem;
      color: #f1c40f;
    }
    .total-amount span {
      font-size: .72rem;
      color: #aaa;
      display: block;
      margin-bottom: 2px;
    }

    /* SUMMARY CARDS */
    .summary-section h2 {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: .06em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-left: 2px;
      border-left: 3px solid var(--accent);
      padding-left: 10px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
    }
    .card.g1::before { background: #f39c12; }
    .card.g2::before { background: #3498db; }
    .card.g3::before { background: #2ecc71; }
    .card.g4::before { background: #e91e8c; }
    .card.g5::before { background: #9b59b6; }
    .card.g6::before { background: #e6b800; }
    .card-label {
      font-size: .72rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card-total {
      font-size: 1.6rem;
      font-weight: 900;
      font-family: 'DM Mono', monospace;
      color: var(--text);
    }
    .card-total::after {
      content: ' 元';
      font-size: .8rem;
      color: var(--muted);
      font-weight: 400;
    }
    .card-detail {
      font-size: .72rem;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.6;
    }
    .grand-card {
      background: #1a1a1a;
      color: #fff;
    }
    .grand-card .card-label { color: #aaa; }
    .grand-card .card-total { color: #f1c40f; }
    .grand-card .card-detail { color: #888; }

    /* FIREBASE CONFIG MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 36px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .modal h2 { font-size: 1.2rem; font-weight: 900; margin-bottom: 8px; }
    .modal p  { font-size: .85rem; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
    .modal .field { margin-bottom: 14px; }
    .modal .field label { display: block; font-size: .8rem; font-weight: 700; margin-bottom: 5px; color: #555; }
    .modal .field input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: .85rem;
      font-family: 'DM Mono', monospace;
      background: var(--bg);
    }
    .modal .field input:focus { outline: none; border-color: var(--accent); }
    .modal .actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .modal-note {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 6px;
      padding: 12px;
      font-size: .78rem;
      color: #795548;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 30px; right: 30px;
      background: #1a1a1a;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: .85rem;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s ease;
      z-index: 9998;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 768px) {
      header, .toolbar, main { padding-left: 16px; padding-right: 16px; }
      .cards { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div>
    <h1>國小課本 <span>採購管理</span> 系統</h1>
    <div class="header-meta">Elementary School Textbook Purchase Tracker</div>
  </div>
</header>

<!-- ── TOOLBAR ── -->
<div class="toolbar">
  <label>學校 / 班級名稱：</label>
  <input type="text" id="school-name" value="新莊國小" />
  <button class="btn btn-secondary" onclick="loadData()">📥 載入資料</button>
  <button class="btn btn-primary"   onclick="saveData()">💾 儲存至 Firebase</button>
  <button class="btn btn-outline"   onclick="resetAll()">🗑 清除全部勾選</button>
  <span id="status-msg">⬤ 未連線</span>
</div>

<!-- ── MAIN ── -->
<main>
  <div class="table-card">
    <div class="table-scroll">
      <table id="book-table">
        <thead>
          <tr>
            <th>領域 / 科目</th>
            <th class="col-g1">一年級</th>
            <th class="col-g2">二年級</th>
            <th class="col-g3">三年級</th>
            <th class="col-g4">四年級</th>
            <th class="col-g5">五年級</th>
            <th class="col-g6">六年級</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
        <tfoot>
          <tr class="total-row" id="total-row">
            <td>📊 年級合計</td>
            <td id="tot-g1"><div class="total-amount"><span>合計</span>0 元</div></td>
            <td id="tot-g2"><div class="total-amount"><span>合計</span>0 元</div></td>
            <td id="tot-g3"><div class="total-amount"><span>合計</span>0 元</div></td>
            <td id="tot-g4"><div class="total-amount"><span>合計</span>0 元</div></td>
            <td id="tot-g5"><div class="total-amount"><span>合計</span>0 元</div></td>
            <td id="tot-g6"><div class="total-amount"><span>合計</span>0 元</div></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="summary-section">
    <h2>各年級費用總覽</h2>
    <div class="cards" id="summary-cards"></div>
  </div>
</main>

<div id="toast"></div>

// ── RENDER TABLE ─────────────────────────────────────────────────
const PUBLISHERS = ['康軒','南一','翰林','何嘉仁','其他'];

function pubOptions(selected) {
  return PUBLISHERS.map(p =>
    `<option value="${p}" ${p===selected?'selected':''}>${p}</option>`
  ).join('');
}

function volOptions(selected) {
  return Array.from({length:12},(_,i)=>i+1).map(v =>
    `<option value="${v}" ${v===selected?'selected':''}>第${v}冊</option>`
  ).join('');
}

function buildTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  SUBJECTS.forEach((subj, si) => {
    const tr = document.createElement('tr');
    const tdSubj = document.createElement('td');
    tdSubj.className = 'subject-cell';
    tdSubj.innerHTML = subj.name.replace(/\n/g,'<br>');
    tr.appendChild(tdSubj);

    const isEnglish = subj.name === '英語';

    subj.grades.forEach((g, gi) => {
      const td = document.createElement('td');
      td.className = `book-cell col-${GRADE_COLORS[gi]}`;

      if (!g) {
        td.classList.add('na');
        tr.appendChild(td);
        return;
      }

      let html = `
        <div class="pub-row">
          <select class="pub-select" id="pub-${si}-${gi}" title="選擇版本">
            ${pubOptions(g.publisher)}
          </select>
          <select class="vol-select" id="vol-${si}-${gi}" title="選擇冊數">
            ${volOptions(g.vol)}
          </select>
        </div>`;

      if (isEnglish) {
        const notesVal = (g.notes || '').replace(/"/g,'&quot;');
        html += `<textarea class="notes-input" id="note-${si}-${gi}" placeholder="備註（書名等）">${notesVal}</textarea>`;
      }

      html += `
        <div class="check-row">
          <input type="checkbox" id="tb-${si}-${gi}"
            data-si="${si}" data-gi="${gi}" data-type="tb" data-price="${g.tb}"
            onchange="recalculate()" />
          <label for="tb-${si}-${gi}">課本</label>
          <input type="number" class="price-input" id="tp-${si}-${gi}"
            value="${g.tb}" min="0" title="點擊可修改課本價格"
            oninput="updatePrice(this,'tb-${si}-${gi}')" />
        </div>`;

      if (g.wb) {
        html += `
        <div class="check-row">
          <input type="checkbox" id="wb-${si}-${gi}"
            data-si="${si}" data-gi="${gi}" data-type="wb" data-price="${g.wb}"
            onchange="recalculate()" />
          <label for="wb-${si}-${gi}">習作</label>
          <input type="number" class="price-input" id="wp-${si}-${gi}"
            value="${g.wb}" min="0" title="點擊可修改習作價格"
            oninput="updatePrice(this,'wb-${si}-${gi}')" />
        </div>`;
      }

      td.innerHTML = html;
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

// ── UPDATE PRICE ──────────────────────────────────────────────────
function updatePrice(inputEl, cbId) {
  const cb = document.getElementById(cbId);
  const val = parseInt(inputEl.value) || 0;
  if (cb) cb.dataset.price = val;
  recalculate();
}
window.updatePrice = updatePrice;


function recalculate() {
  const totals = [0,0,0,0,0,0];
  const details = Array.from({length:6}, () => ({tb:0, wb:0, items:[]}));

  document.querySelectorAll('#table-body input[type="checkbox"]:checked').forEach(cb => {
    const gi    = parseInt(cb.dataset.gi);
    const si    = parseInt(cb.dataset.si);
    const price = parseInt(cb.dataset.price);
    const type  = cb.dataset.type;
    totals[gi] += price;
    details[gi][type] += price;
    details[gi].items.push({ name: SUBJECTS[si].name.replace('\n',' '), type, price });
  });

  // update table footer
  for (let i = 0; i < 6; i++) {
    document.getElementById(`tot-g${i+1}`).innerHTML =
      `<div class="total-amount"><span>合計</span>${totals[i].toLocaleString()} 元</div>`;
  }

  // update summary cards
  buildSummaryCards(totals, details);
}

function buildSummaryCards(totals, details) {
  const grand = totals.reduce((a,b)=>a+b,0);
  const container = document.getElementById('summary-cards');
  container.innerHTML = '';

  const gradeNames = ['一','二','三','四','五','六'];
  totals.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = `card g${i+1}`;
    card.innerHTML = `
      <div class="card-label">第 ${gradeNames[i]} 年級</div>
      <div class="card-total">${t.toLocaleString()}</div>
      <div class="card-detail">
        課本：$${details[i].tb.toLocaleString()}<br>
        習作：$${details[i].wb.toLocaleString()}
      </div>`;
    container.appendChild(card);
  });

  // grand total
  const grand_card = document.createElement('div');
  grand_card.className = 'card grand-card';
  grand_card.innerHTML = `
    <div class="card-label">全校合計</div>
    <div class="card-total" style="color:#f1c40f">${grand.toLocaleString()}</div>
    <div class="card-detail">所有年級 / 全科目</div>`;
  container.appendChild(grand_card);
}

// ── RESET ─────────────────────────────────────────────────────────
function resetAll() {
  document.querySelectorAll('#table-body input[type="checkbox"]').forEach(cb => cb.checked = false);
  recalculate();
  toast('已清除所有勾選');
}

// ── FIREBASE SAVE / LOAD ──────────────────────────────────────────
async function saveData() {
  const name = document.getElementById('school-name').value.trim();
  if (!name) { toast('請先輸入學校/班級名稱'); return; }

  const payload = { name, savedAt: new Date().toISOString(), selections: {}, prices: {}, meta: {} };
  document.querySelectorAll('#table-body input[type="checkbox"]').forEach(cb => {
    const key = `${cb.dataset.si}_${cb.dataset.gi}_${cb.dataset.type}`;
    payload.selections[key] = cb.checked;
    payload.prices[key] = parseInt(cb.dataset.price) || 0;
  });
  // save publisher, vol, notes per cell
  SUBJECTS.forEach((subj, si) => {
    subj.grades.forEach((g, gi) => {
      if (!g) return;
      const mkey = `${si}_${gi}`;
      const pubEl  = document.getElementById(`pub-${si}-${gi}`);
      const volEl  = document.getElementById(`vol-${si}-${gi}`);
      const noteEl = document.getElementById(`note-${si}-${gi}`);
      payload.meta[mkey] = {
        pub:  pubEl  ? pubEl.value  : g.publisher,
        vol:  volEl  ? volEl.value  : g.vol,
        note: noteEl ? noteEl.value : (g.notes||''),
      };
    });
  });

  setStatus('儲存中…','busy');
  try {
    await setDoc(doc(db, 'purchases', name), payload);
    setStatus('✅ 已儲存','ok');
    toast('✅ 儲存成功！');
  } catch(e) {
    setStatus('❌ 儲存失敗','err');
    toast('儲存失敗：' + e.message);
  }
}

async function loadData() {
  const name = document.getElementById('school-name').value.trim();
  if (!name) { toast('請先輸入學校/班級名稱'); return; }

  setStatus('載入中…','busy');
  try {
    const snap = await getDoc(doc(db, 'purchases', name));
    if (!snap.exists()) { toast('找不到此名稱的資料'); setStatus('找不到資料','err'); return; }

    const sel    = snap.data().selections || {};
    const prices = snap.data().prices     || {};
    const meta   = snap.data().meta       || {};

    document.querySelectorAll('#table-body input[type="checkbox"]').forEach(cb => {
      const key = `${cb.dataset.si}_${cb.dataset.gi}_${cb.dataset.type}`;
      cb.checked = !!sel[key];
      if (prices[key] !== undefined) {
        cb.dataset.price = prices[key];
        const prefix = cb.dataset.type === 'tb' ? 'tp' : 'wp';
        const inp = document.getElementById(`${prefix}-${cb.dataset.si}-${cb.dataset.gi}`);
        if (inp) inp.value = prices[key];
      }
    });

    // restore publisher / vol / notes
    Object.entries(meta).forEach(([mkey, m]) => {
      const [si, gi] = mkey.split('_');
      const pubEl  = document.getElementById(`pub-${si}-${gi}`);
      const volEl  = document.getElementById(`vol-${si}-${gi}`);
      const noteEl = document.getElementById(`note-${si}-${gi}`);
      if (pubEl  && m.pub)  pubEl.value  = m.pub;
      if (volEl  && m.vol)  volEl.value  = m.vol;
      if (noteEl && m.note !== undefined) noteEl.value = m.note;
    });
    recalculate();
    setStatus('✅ 已載入','ok');
    toast('✅ 資料載入成功！');
  } catch(e) {
    setStatus('❌ 載入失敗','err');
    toast('載入失敗：' + e.message);
  }
}

// expose to inline onclick handlers
window.saveData = saveData;
window.loadData = loadData;

// ── STATUS / TOAST ─────────────────────────────────────────────────
function setStatus(msg, cls) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = cls;
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── INIT ──────────────────────────────────────────────────────────
window.resetAll = resetAll;

window.addEventListener('DOMContentLoaded', () => {
  buildTable();
  document.querySelectorAll('#table-body input[type="checkbox"]').forEach(cb => cb.checked = true);
  recalculate();
  setStatus('✅ Firebase 已連線', 'ok');
});
</script>
